<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carro 3D — Three.js</title>
  <style>
    /* Reset básico: remove margens e scrollbar do body */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      overflow: hidden; /* Esconde barra de scroll, pois o canvas ocupa tudo */
    }

    /* O canvas vai ocupar a janela inteira */
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* HUD — painel de controles sobreposto ao canvas */
    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 2;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Painel lateral com explicações das primitivas */
    #info {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.55);
      color: #cde;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.9;
      max-width: 200px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Velocímetro no rodapé */
    #velocimetro {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <!-- ============================================================
       INTERFACE (HUD)
       Estes elementos ficam na frente do canvas usando position:absolute
  ============================================================ -->

  <div id="hud">
    <strong style="font-size:14px; color:#7df;">Controles</strong><br>
    W / ↑ &nbsp;— acelerar<br>
    S / ↓ &nbsp;— freiar / ré<br>
    A / ← &nbsp;— virar esquerda<br>
    D / → &nbsp;— virar direita
  </div>

  <div id="info">
    <strong style="color:#fff;">Primitivas Three.js</strong><br>
    <span style="color:#ffa;">BoxGeometry</span> — corpo + cabine<br>
    <span style="color:#afa;">CylinderGeometry</span> — rodas<br>
    <span style="color:#adf;">PlaneGeometry</span> — chão<br>
    <span style="color:#fca;">Group</span> — agrupa peças
  </div>

  <div id="velocimetro">
    Velocidade: <span id="spd" style="color:#7df; font-weight:bold;">0</span> km/h
  </div>

  <!-- ============================================================
       PASSO 1 — Importar a biblioteca Three.js
       Carregamos o Three.js via CDN (URL pública, sem precisar instalar nada).
       Depois que o script carrega, o objeto global THREE fica disponível.
  ============================================================ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    /* ==============================================================
       PASSO 2 — Os três elementos fundamentais de qualquer cena Three.js

       Todo projeto Three.js PRECISA desses três objetos:
         1. Scene    — o "mundo" onde tudo existe
         2. Camera   — o "olho" que enxerga a cena
         3. Renderer — o "pintor" que desenha tudo no canvas

       Sem esses três, nada aparece na tela.
    ============================================================== */

    // --- 2a. SCENE ---
    // A cena é o container principal. Tudo que você quer exibir
    // (luzes, objetos, partículas) deve ser adicionado à cena.
    const scene = new THREE.Scene();

    // Cor de fundo do céu (hex RGB)
    scene.background = new THREE.Color(0x87CEEB); // azul céu

    // Fog (neblina) — objetos distantes ficam "apagados".
    // Parâmetros: cor, distância inicial, distância total
    scene.fog = new THREE.Fog(0x87CEEB, 40, 120);

    // --- 2b. CAMERA ---
    // PerspectiveCamera imita o olho humano (objetos distantes parecem menores).
    // Parâmetros:
    //   fov (field of view) — ângulo de visão em graus (60° é natural)
    //   aspect             — proporção largura/altura da tela
    //   near               — distância mínima de renderização
    //   far                — distância máxima de renderização
    const camera = new THREE.PerspectiveCamera(
      60,                                    // fov
      window.innerWidth / window.innerHeight, // aspect
      0.1,                                   // near
      200                                    // far
    );
    // Posição inicial da câmera (será atualizada no loop)
    camera.position.set(0, 5, 10);

    // --- 2c. RENDERER ---
    // O WebGLRenderer usa a GPU do computador para desenhar a cena.
    // antialias: true suaviza as bordas denteadas dos objetos.
    const renderer = new THREE.WebGLRenderer({ antialias: true });

    // Define o tamanho do canvas (janela inteira)
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Ativa sombras no renderer (desabilitado por padrão)
    renderer.shadowMap.enabled = true;

    // Adiciona o canvas criado pelo renderer ao HTML
    document.body.appendChild(renderer.domElement);


    /* ==============================================================
       PASSO 3 — ILUMINAÇÃO
       Sem luz, todos os objetos aparecem pretos.
       Three.js tem vários tipos de luz; aqui usamos dois:
         - AmbientLight  — luz global suave, ilumina tudo igualmente
         - DirectionalLight — luz direcional, como o sol, cria sombras
    ============================================================== */

    // Luz ambiente: ilumina todos os objetos sem direção específica.
    // Parâmetros: cor (branco), intensidade (0 a 1)
    const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(luzAmbiente); // SEMPRE use scene.add() para colocar algo na cena

    // Luz direcional: imita o sol.
    // Parâmetros: cor, intensidade
    const sol = new THREE.DirectionalLight(0xfffbe0, 1.2);
    sol.position.set(10, 20, 10); // posição do "sol" no espaço
    sol.castShadow = true;        // essa luz projeta sombras
    scene.add(sol);


    /* ==============================================================
       PASSO 4 — PRIMITIVAS (Geometrias básicas do Three.js)

       Primitivas são formas geométricas prontas. Para criar um objeto 3D
       no Three.js, precisamos sempre de dois componentes:
         - Geometry (forma) — define o formato/vértices do objeto
         - Material (aparência) — define cor, textura, brilho etc.
       Juntamos os dois em um Mesh, e adicionamos o Mesh à cena.

       Fórmula:
         const geo = new THREE.BoxGeometry(...);
         const mat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
         const mesh = new THREE.Mesh(geo, mat);
         scene.add(mesh);
    ============================================================== */

    // --- PRIMITIVA 1: PlaneGeometry — o CHÃO ---
    // PlaneGeometry cria um plano flat (como uma folha de papel).
    // Parâmetros: largura, altura, segmentos X, segmentos Y
    const geoChao = new THREE.PlaneGeometry(200, 200, 20, 20);

    // MeshLambertMaterial reage à luz (diferente do básico MeshBasicMaterial)
    const matChao = new THREE.MeshLambertMaterial({ color: 0x4a7c3f }); // verde grama

    const chao = new THREE.Mesh(geoChao, matChao);

    // O PlaneGeometry fica em pé por padrão (vertical).
    // Rotacionamos -90° no eixo X para deixá-lo deitado (horizontal).
    chao.rotation.x = -Math.PI / 2; // Math.PI = 180°, então Math.PI/2 = 90°

    chao.receiveShadow = true; // o chão recebe sombras dos objetos
    scene.add(chao);

    // GridHelper — grade visual sobre o chão (apenas para ajudar a perceber movimento)
    // Parâmetros: tamanho total, número de divisões, cor central, cor das linhas
    const grade = new THREE.GridHelper(200, 40, 0x2d5a27, 0x2d5a27);
    grade.position.y = 0.01; // levemente acima do chão para não "piscardor"
    scene.add(grade);


    /* ==============================================================
       PASSO 5 — GRUPO (THREE.Group)
       Um Group agrupa vários objetos como se fossem um só.
       Quando movemos o grupo, todas as peças se movem juntas.
       Perfeito para montar o carro com várias peças!
    ============================================================== */
    const carro = new THREE.Group();


    /* ==============================================================
       PASSO 6 — CONSTRUINDO O CARRO com primitivas
       Cada peça = uma Geometry + Material + Mesh
       Todas as peças são adicionadas ao Group "carro"
    ============================================================== */

    // --- PEÇA 1: Corpo principal — BoxGeometry ---
    // BoxGeometry cria uma caixa 3D.
    // Parâmetros: largura (X), altura (Y), profundidade (Z)
    const geoCorpo = new THREE.BoxGeometry(2, 0.7, 4);
    const matCorpo = new THREE.MeshLambertMaterial({ color: 0xcc2222 }); // vermelho
    const corpo = new THREE.Mesh(geoCorpo, matCorpo);
    corpo.position.y = 0.7;  // eleva o corpo acima do chão
    corpo.castShadow = true; // projeta sombra no chão
    carro.add(corpo); // adiciona ao GROUP, não à cena!

    // --- PEÇA 2: Cabine (teto) — BoxGeometry menor ---
    const geoCabine = new THREE.BoxGeometry(1.5, 0.6, 2);
    const matCabine = new THREE.MeshLambertMaterial({ color: 0xdd3333 });
    const cabine = new THREE.Mesh(geoCabine, matCabine);
    cabine.position.set(0, 1.35, -0.2); // set(x, y, z) posiciona a peça
    cabine.castShadow = true;
    carro.add(cabine);

    // --- PEÇA 3: Para-brisas (janela dianteira) --- BoxGeometry fino
    const matJanela = new THREE.MeshLambertMaterial({ color: 0xaaddff }); // azul claro
    const paraBrisas = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.45, 0.05), matJanela);
    paraBrisas.position.set(0, 1.35, 0.82);
    carro.add(paraBrisas);

    // --- PEÇA 4: Faróis — BoxGeometry pequenos ---
    const matFarol = new THREE.MeshLambertMaterial({ color: 0xffffaa }); // amarelo claro
    [-0.6, 0.6].forEach(function(x) { // cria farol esquerdo e direito
      const farol = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.1), matFarol);
      farol.position.set(x, 0.7, 2.05); // frente do carro
      carro.add(farol);
    });

    // --- PEÇA 5: Rodas — CylinderGeometry ---
    // CylinderGeometry cria um cilindro.
    // Parâmetros: raio do topo, raio da base, altura, nº de segmentos laterais
    // Mais segmentos = mais redondo (16 já parece bem circular)
    const rodasMeshes = []; // guardamos referência para animá-las depois

    function criarRoda(x, z) {
      // Pneu (cilindro preto)
      const geoPneu = new THREE.CylinderGeometry(0.38, 0.38, 0.3, 16);
      const matPneu = new THREE.MeshLambertMaterial({ color: 0x1a1a1a }); // preto
      const pneu = new THREE.Mesh(geoPneu, matPneu);

      // O cilindro fica em pé por padrão. Rotacionamos 90° no Z para deitar.
      pneu.rotation.z = Math.PI / 2;
      pneu.position.set(x, 0.38, z);
      pneu.castShadow = true;

      // Aro (cilindro menor cinza, dentro do pneu)
      const geoAro = new THREE.CylinderGeometry(0.22, 0.22, 0.32, 8);
      const matAro = new THREE.MeshLambertMaterial({ color: 0xcccccc }); // prata
      const aro = new THREE.Mesh(geoAro, matAro);
      aro.rotation.z = Math.PI / 2;
      aro.position.copy(pneu.position); // mesma posição do pneu

      carro.add(pneu, aro);
      rodasMeshes.push(pneu); // salva para girar no loop
    }

    // Criamos as 4 rodas: frente-esquerda, frente-direita, trás-esquerda, trás-direita
    criarRoda(-1.1,  1.3); // frente esquerda
    criarRoda( 1.1,  1.3); // frente direita
    criarRoda(-1.1, -1.3); // trás esquerda
    criarRoda( 1.1, -1.3); // trás direita

    // Adicionamos o grupo completo do carro à cena
    scene.add(carro);


    /* ==============================================================
       PASSO 7 — OBJETOS DECORATIVOS (árvores)
       Demonstra como reutilizar geometrias para criar vários objetos
    ============================================================== */
    function criarArvore(x, z) {
      // Tronco — CylinderGeometry levemente cônico
      const tronco = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.3, 1.5, 6),
        new THREE.MeshLambertMaterial({ color: 0x6b3f1f })
      );
      tronco.position.set(x, 0.75, z);

      // Copa — CylinderGeometry cônico (raio do topo = 0 → fica pontiagudo)
      const copa = new THREE.Mesh(
        new THREE.CylinderGeometry(0, 1.2, 2.5, 6),
        new THREE.MeshLambertMaterial({ color: 0x2d7a2d })
      );
      copa.position.set(x, 2.5, z);

      scene.add(tronco, copa);
    }

    // Posições das árvores ao redor da pista
    const posArvores = [
      [8,5],[12,-10],[-9,8],[-14,-5],
      [6,-18],[18,14],[-18,12],[3,22],[-7,-22],[20,-15]
    ];
    posArvores.forEach(function(pos) { criarArvore(pos[0], pos[1]); });


    /* ==============================================================
       PASSO 8 — CONTROLES DO TECLADO
       Rastreamos quais teclas estão pressionadas em tempo real.
       O objeto "teclas" funciona como um mapa: tecla → true/false
    ============================================================== */
    const teclas = {}; // ex: { 'w': true, 'ArrowUp': false }

    document.addEventListener('keydown', function(evento) {
      teclas[evento.key] = true;   // marca como pressionada
      evento.preventDefault();     // evita que a página role com as setas
    });

    document.addEventListener('keyup', function(evento) {
      teclas[evento.key] = false;  // marca como solta
    });


    /* ==============================================================
       PASSO 9 — FÍSICA SIMPLES DO CARRO
       Não usamos uma engine de física completa.
       Simulamos movimento com variáveis simples:
         - velocidade: quão rápido o carro anda (pode ser negativa = ré)
         - angulo: para onde o carro está apontando (em radianos)
    ============================================================== */
    let velocidade = 0;  // velocidade atual (unidades por frame)
    let angulo = 0;      // direção do carro em radianos

    const VEL_MAX    = 0.25;  // velocidade máxima para frente
    const ACELERACAO = 0.008; // quanto acelera por frame
    const ATRITO     = 0.96;  // multiplicador de desaceleração (< 1 = vai freando)
    const ESTERCO    = 0.035; // velocidade angular da curva (radianos/frame)


    /* ==============================================================
       PASSO 10 — LOOP DE ANIMAÇÃO
       requestAnimationFrame é a função nativa do browser para animar.
       Ela chama nossa função "animar" ~60 vezes por segundo (60 FPS).
       A cada chamada: atualizamos física → movemos objetos → renderizamos.
    ============================================================== */
    function animar() {
      // Agenda o próximo frame (cria o loop infinito)
      requestAnimationFrame(animar);

      // --- Leitura das teclas pressionadas ---
      const acelerar  = teclas['w'] || teclas['W'] || teclas['ArrowUp'];
      const freiar    = teclas['s'] || teclas['S'] || teclas['ArrowDown'];
      const esquerda  = teclas['a'] || teclas['A'] || teclas['ArrowLeft'];
      const direita   = teclas['d'] || teclas['D'] || teclas['ArrowRight'];

      // --- Atualização da velocidade ---
      if (acelerar) velocidade = Math.min(velocidade + ACELERACAO, VEL_MAX);
      if (freiar)   velocidade = Math.max(velocidade - ACELERACAO, -VEL_MAX * 0.6);

      // Aplica atrito: a velocidade diminui gradualmente a cada frame
      velocidade *= ATRITO;

      // Evita velocidades minúsculas que nunca chegam ao zero
      if (Math.abs(velocidade) < 0.001) velocidade = 0;

      // --- Atualização do ângulo (direção) ---
      // Só viramos se estiver em movimento (evita girar parado)
      if (Math.abs(velocidade) > 0.005) {
        const sentido = velocidade > 0 ? 1 : -1; // ré inverte a direção da curva
        if (esquerda) angulo += ESTERCO * sentido;
        if (direita)  angulo -= ESTERCO * sentido;
      }

      // --- Translação do carro ---
      // Convertemos o ângulo (radianos) em deslocamento X e Z.
      // sin e cos descrevem o vetor de direção do carro.
      carro.position.x += Math.sin(angulo) * velocidade;
      carro.position.z += Math.cos(angulo) * velocidade;

      // Aplicamos a rotação ao grupo inteiro do carro
      carro.rotation.y = angulo;

      // --- Animação das rodas ---
      // As rodas giram proporcionalmente à velocidade do carro
      const giroRoda = velocidade * 8;
      rodasMeshes.forEach(function(roda) {
        roda.rotation.x += giroRoda; // giro no eixo X = roda rodando
      });

      // --- CÂMERA segue o carro ---
      // A câmera fica atrás e acima do carro, apontando para ele.
      // Calculamos a posição "atrás do carro" usando seu ângulo:
      const distanciaCam = 10; // distância da câmera ao carro
      const alturaCam    = 5;  // altura da câmera

      camera.position.x = carro.position.x - Math.sin(angulo) * distanciaCam;
      camera.position.y = alturaCam;
      camera.position.z = carro.position.z - Math.cos(angulo) * distanciaCam;

      // lookAt faz a câmera apontar para o carro
      camera.lookAt(carro.position.x, 1, carro.position.z);

      // --- Atualizar velocímetro no HUD ---
      // Convertemos a velocidade interna para uma escala "km/h" visual
      document.getElementById('spd').textContent = Math.round(Math.abs(velocidade) * 400);

      // --- Renderizar o frame ---
      // Sem essa linha, nada aparece na tela!
      renderer.render(scene, camera);
    }

    // Inicia o loop de animação
    animar();


    /* ==============================================================
       PASSO 11 — RESPONSIVIDADE
       Quando a janela muda de tamanho, atualizamos câmera e renderer
       para evitar distorções na imagem.
    ============================================================== */
    window.addEventListener('resize', function() {
      const largura = window.innerWidth;
      const altura  = window.innerHeight;

      // Atualiza o aspect ratio da câmera
      camera.aspect = largura / altura;
      camera.updateProjectionMatrix(); // obrigatório após mudar propriedades da câmera

      // Atualiza o tamanho do canvas
      renderer.setSize(largura, altura);
    });

  </script>
</body>
</html>
